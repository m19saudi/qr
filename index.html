  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      width: 900px;
      height: 500px;
      background: #111827;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .left, .right {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
    }

    .left {
      background: #1f2937;
      justify-content: flex-start;
      padding-top: 20px;
    }

    h1 {
      margin-bottom: 15px;
      font-size: 28px;
    }

    textarea {
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      outline: none;
      background: #111827;
      color: #fff;
      height: 180px;
      resize: none;
      overflow-y: auto;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
    }

    textarea::placeholder {
      color: #9ca3af;
    }

    .buttons {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: #9ca3af;
    }

    .right {
      background: #0f172a;
      align-items: center;
      justify-content: center;
      display: flex;
    }

    #qrcode {
      padding: 20px;
      background: white;
      border-radius: 12px;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h1>QR Code Generator</h1>
      <textarea id="text" placeholder="Paste your long URL or text here..."></textarea>
      <div class="buttons">
        <button onclick="pasteRaw()">Paste</button>
        <button onclick="downloadQR()">Download QR</button>
      </div>
      <div class="hint">QR updates instantly as you type</div>
    </div>

    <div class="right" id="rightPanel">
      <div id="qrcode"></div>
    </div>
  </div>

  <script>
    const qrContainer = document.getElementById("qrcode");
    const input = document.getElementById("text");
    const rightPanel = document.getElementById("rightPanel");

    // Initialize QR code
    let qr = new QRCode(qrContainer, {
      text: "",
      width: 220,
      height: 220
    });

    function updateQR() {
      qr.clear();
      qr.makeCode(input.value || " ");
    }

    input.addEventListener("input", updateQR);

    async function pasteRaw() {
      try {
        const text = await navigator.clipboard.readText();
        input.value = text;
        updateQR();
      } catch (err) {
        alert("Clipboard access denied. Please paste manually.");
      }
    }

    function downloadQR() {
      // Use html2canvas to capture the right panel exactly
      html2canvas(rightPanel, {backgroundColor: null}).then(canvas => {
        const url = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = url;
        link.download = "qr-code.png";
        link.click();
      });
    }
  </script>
</body>
</html>
