<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live QR Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px; /* Added padding for mobile spacing */
    }

    .container {
      display: flex;
      flex-direction: column; /* Stack elements vertically on small screens */
      width: 100%; /* Full width */
      max-width: 900px; /* Limit max width for larger screens */
      height: auto;
      background: #111827;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .left, .right {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .left {
      background: #1f2937;
      justify-content: flex-start;
    }

    h1 {
      margin-bottom: 15px;
      font-size: 24px; /* Adjusted font size */
      text-align: center;
    }

    textarea {
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      outline: none;
      background: #111827;
      color: #fff;
      height: 150px;
      resize: none;
      overflow-y: auto;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
      width: 100%; /* Make it responsive */
    }

    textarea::placeholder {
      color: #9ca3af;
    }

    .buttons {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      justify-content: center; /* Center the buttons */
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: #9ca3af;
      text-align: center; /* Centered text */
    }

    .right {
      background: #0f172a;
      align-items: center;
      justify-content: center;
      display: flex;
    }

    #qrcode {
      padding: 20px;
      background: white;
      border-radius: 12px;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Media query for small screens */
    @media (max-width: 768px) {
      .container {
        flex-direction: column; /* Stack left and right sections vertically */
        max-width: 100%;
      }

      .left, .right {
        width: 100%; /* Full width */
        padding: 15px;
      }

      h1 {
        font-size: 22px; /* Smaller font size */
      }

      textarea {
        height: 120px;
        font-size: 14px;
      }

      #qrcode {
        width: 180px;
        height: 180px;
      }

      button {
        font-size: 12px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h1>QR Code Generator</h1>
      <textarea id="text" placeholder="Paste your long URL or text here..."></textarea>
      <div class="buttons">
        <button onclick="pasteRaw()">Paste</button>
        <button onclick="downloadQR()">Download QR</button>
      </div>
      <div class="hint">QR updates instantly as you type</div>
    </div>

    <div class="right" id="rightPanel">
      <div id="qrcode"></div>
    </div>
  </div>

  <script>
    const qrContainer = document.getElementById("qrcode");
    const input = document.getElementById("text");
    const rightPanel = document.getElementById("rightPanel");

    // Initialize QR code
    let qr = new QRCode(qrContainer, {
      text: "",
      width: 220,
      height: 220
    });

    function updateQR() {
      qr.clear();
      qr.makeCode(input.value || " ");
    }

    input.addEventListener("input", updateQR);

    async function pasteRaw() {
      try {
        const text = await navigator.clipboard.readText();
        input.value = text;
        updateQR();
      } catch (err) {
        alert("Clipboard access denied. Please paste manually.");
      }
    }

    function downloadQR() {
      // Use html2canvas to capture the right panel exactly
      html2canvas(rightPanel, {backgroundColor: null}).then(canvas => {
        const url = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = url;
        link.download = "qr-code.png";
        link.click();
      });
    }
  </script>
</body>
</html>
